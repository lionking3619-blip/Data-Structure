<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>119 파이어 택틱스 - 안정화 버전</title>
    <style>
        :root { 
            /* 이미지 미로딩 시 보일 기본 색상 */
            --fire-bg: #d63031; 
            --foam-bg: #e17055; 
            --co2-bg: #6c5ce7;
            --overlay: rgba(0, 0, 0, 0.4);
        }
        body { background: #121212; color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 0; overflow: hidden; }
        
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.5s; }
        #screen-start { background: #2d3436; }
        #screen-game { background: #1e1e1e; display: none; }
        #screen-gameover { background: rgba(214, 48, 49, 0.95); display: none; z-index: 200; }

        h1 { font-size: 50px; text-shadow: 0 0 20px #ff7675; margin-bottom: 10px; text-align: center; }
        .btn-main { padding: 20px 60px; font-size: 24px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; background: #d63031; color: white; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px #d63031; }

        /* 게임 플레이 영역 */
        #queue-container { width: 720px; height: 150px; border: 4px solid #444; display: flex; align-items: center; padding: 10px; gap: 15px; background: #000; border-radius: 15px; margin: 20px 0; overflow: hidden; }
        
        /* 화재 사각형 (110x110) */
        .incident { 
            width: 110px; height: 110px; border-radius: 12px; 
            display: flex; flex-direction: column; position: relative; 
            overflow: hidden; flex-shrink: 0; 
            background-size: cover; background-position: center;
            border: 2px solid #555;
            transition: transform 0.2s;
        }
        
        /* 큐의 맨 앞 강조 */
        .incident.front { border: 5px solid #fff; box-shadow: 0 0 25px #fff; transform: scale(1.1); z-index: 10; }

        /* 화재 종류 텍스트 레이블 */
        .incident .label { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--overlay); 
            font-size: 14px; font-weight: bold; text-align: center; z-index: 2;
        }
        
        .burn-bar { position: absolute; bottom: 0; left: 0; height: 12px; background: #ff0000; width: 0%; z-index: 3; }

        /* 화재 타입별 배경 설정 (이미지 주소 변경 및 배경색 백업) */
        .type-W { background-color: var(--fire-bg); background-image: url('https://picsum.photos/id/440/150/150'); } /* 주택 */
        .type-F { background-color: var(--foam-bg); background-image: url('https://picsum.photos/id/1071/150/150'); } /* 유류/차량 */
        .type-C { background-color: var(--co2-bg); background-image: url('https://picsum.photos/id/1081/150/150'); } /* 전기/기계 */

        .equip-group { display: flex; gap: 10px; margin-top: 20px; }
        .equip-btn { padding: 15px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; opacity: 0.4; transition: 0.2s; font-weight: bold; color: white; }
        .equip-btn.active { opacity: 1; transform: translateY(-5px); border: 2px solid white; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        
        #btn-W { background: #0984e3; }
        #btn-F { background: #e17055; }
        #btn-C { background: #6c5ce7; }

        #dispatch-btn { margin-top: 30px; padding: 25px 150px; font-size: 26px; font-weight: bold; background: #d63031; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 #861e1e; }
        #dispatch-btn:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen">
        <h1>🔥 119 FIRE TACTICS</h1>
        <p style="text-align:center; color: #aaa; margin-bottom: 30px;">화재 대기열(Queue)을 관리하고 도시를 구하세요!</p>
        <button class="btn-main" onclick="startGame()">현장으로 출동</button>
    </div>

    <div id="screen-game" class="screen">
        <div style="display:flex; gap: 50px; font-size: 22px; font-weight: bold; margin-bottom: 10px;">
            <div>점수: <span id="score">0</span></div>
            <div>체력: <span id="hp">3</span></div>
        </div>
        
        <div id="queue-container"></div>

        <div class="equip-group">
            <button id="btn-W" class="equip-btn active" onclick="setEquip('W')">물 [일반]</button>
            <button id="btn-F" class="equip-btn" onclick="setEquip('F')">포소화 [유류]</button>
            <button id="btn-C" class="equip-btn" onclick="setEquip('C')">CO2 [전기]</button>
        </div>
        
        <button id="dispatch-btn" onclick="dispatch()">🚒 진압 시도</button>
    </div>

    <div id="screen-gameover" class="screen">
        <h2 style="font-size: 60px;">GAME OVER</h2>
        <div id="final-score" style="font-size: 24px; margin-bottom: 30px;">최종 점수: 0</div>
        <button class="btn-main" onclick="backToStart()">다시 도전</button>
    </div>

    <script>
        let queue = [];
        let score = 0;
        let hp = 3;
        let currentEquip = 'W';
        let gameInterval, spawnTimeout;
        let isPlaying = false;

        const types = [
            {id: 'W', name: '🏠 주택 화재', cssClass: 'type-W'},
            {id: 'F', name: '🚗 유류 화재', cssClass: 'type-F'},
            {id: 'C', name: '⚡ 전기 화재', cssClass: 'type-C'}
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function startGame() {
            queue = []; score = 0; hp = 3; isPlaying = true;
            setEquip('W'); updateUI();
            showScreen('screen-game');
            gameInterval = setInterval(gameLogic, 100);
            spawnLoop();
        }

        function backToStart() { showScreen('screen-start'); }

        function setEquip(type) {
            currentEquip = type;
            document.querySelectorAll('.equip-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
        }

        function spawnFire() {
            if (!isPlaying) return;
            const typeInfo = types[Math.floor(Math.random() * types.length)];
            queue.push({ ...typeInfo, burn: 0 });
            updateUI();
        }

        function spawnLoop() {
            if (!isPlaying) return;
            spawnFire();
            let delay = Math.max(700, 3000 - (score / 20));
            spawnTimeout = setTimeout(spawnLoop, delay);
        }

        function dispatch() {
            if (!isPlaying || queue.length === 0) return;
            const target = queue[0];
            if (target.id === currentEquip) {
                queue.shift();
                score += 100;
            } else {
                queue[0].burn += 20;
            }
            updateUI();
        }

        function gameLogic() {
            if (!isPlaying) return;
            queue.forEach((f, i) => {
                f.burn += (i === 0 ? 1.5 : 0.4);
                if (f.burn >= 100) {
                    queue.shift();
                    hp--;
                    if (hp <= 0) gameOver();
                }
            });
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('queue-container');
            container.innerHTML = '';
            document.getElementById('score').innerText = score;
            document.getElementById('hp').innerText = hp;

            queue.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = `incident ${f.cssClass}` + (i === 0 ? ' front' : '');
                div.innerHTML = `<div class="label">${f.name}</div><div class="burn-bar" style="width:${f.burn}%"></div>`;
                container.appendChild(div);
            });
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearTimeout(spawnTimeout);
            document.getElementById('final-score').innerText = `최종 점수: ${score}`;
            showScreen('screen-gameover');
        }
    </script>
</body>
</html>
