<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-color: #161b22;
            --accent-neon: #00ff88;
            --food-color: #ff2e63;
            --text-color: #e6edf3;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        /* 메인 컨테이너 */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 상단 점수판 */
        .header {
            display: flex;
            justify-content: space-between;
            width: 400px;
            padding: 10px 20px;
            background: var(--panel-color);
            border-radius: 12px;
            border: 1px solid #30363d;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #8b949e; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; color: var(--accent-neon); }

        /* 게임 보드 */
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas {
            background-color: #010409;
            border-radius: 8px;
            border: 2px solid #30363d;
            display: block;
        }

        /* 게임 오버/시작 오버레이 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        h2 { font-family: 'Orbitron', sans-serif; color: var(--accent-neon); margin: 0 0 10px 0; }
        p { margin: 0 0 20px 0; font-weight: 300; }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--accent-neon);
            border: none;
            border-radius: 5px;
            color: #0d1117;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <div class="stat-item">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">LEVEL</div>
            <div id="level" class="stat-value">1</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">HIGH SCORE</div>
            <div id="highScore" class="stat-value">0</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h2 id="overlay-title">SNAKE NEON</h2>
            <p id="overlay-desc">방향키를 누르면 시작됩니다</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const highEl = document.getElementById("highScore");
    const overlay = document.getElementById("overlay");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let score = 0;
    let level = 1;
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    highEl.innerText = highScore;

    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 0;
    let dy = 0;
    let gameSpeed = 120;
    let gameInterval;
    let isPaused = true;

    // 뱀 그리기 (부드러운 라운드 처리)
    function drawSnake() {
        snake.forEach((part, i) => {
            const isHead = i === 0;
            ctx.fillStyle = isHead ? "#00ff88" : "#00cc6e";
            
            // 네온 광원 효과
            ctx.shadowBlur = isHead ? 15 : 0;
            ctx.shadowColor = "#00ff88";
            
            // 둥근 사각형 그리기
            const r = 4; // 둥글기 정도
            const x = part.x * gridSize + 2;
            const y = part.y * gridSize + 2;
            const w = gridSize - 4;
            const h = gridSize - 4;
            
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
            ctx.fill();
            
            ctx.shadowBlur = 0; // 다른 객체에 영향 안 주게 초기화
        });
    }

    function drawFood() {
        ctx.fillStyle = "#ff2e63";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff2e63";
        ctx.beginPath();
        ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function moveSnake() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            if (score % 50 === 0) upgradeLevel();
            scoreEl.innerText = score;
            createFood();
        } else {
            snake.pop();
        }
    }

    function upgradeLevel() {
        level++;
        levelEl.innerText = level;
        gameSpeed = Math.max(50, gameSpeed - 10); // 점점 빨라짐
        resetInterval();
    }

    function createFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
        if (snake.some(p => p.x === food.x && p.y === food.y)) createFood();
    }

    function checkCollision() {
        const head = snake[0];
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) return true;
        }
        return false;
    }

    function gameLoop() {
        if (checkCollision()) {
            endGame();
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 아주 연한 그리드 배경 그리기
        ctx.strokeStyle = "#161b22";
        ctx.lineWidth = 0.5;
        for(let i=0; i<canvas.width; i+=gridSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        drawFood();
        moveSnake();
        drawSnake();
    }

    function startGame() {
        overlay.classList.add("hidden");
        score = 0; level = 1; gameSpeed = 120;
        dx = 1; dy = 0;
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        scoreEl.innerText = score;
        levelEl.innerText = level;
        isPaused = false;
        resetInterval();
    }

    function endGame() {
        clearInterval(gameInterval);
        isPaused = true;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
            highEl.innerText = highScore;
        }
        document.getElementById("overlay-title").innerText = "GAME OVER";
        document.getElementById("overlay-desc").innerText = `최종 점수: ${score}`;
        overlay.classList.remove("hidden");
    }

    function resetInterval() {
        clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, gameSpeed);
    }

    window.addEventListener("keydown", e => {
        if (isPaused && e.code.includes("Arrow")) startGame();
        switch(e.key) {
            case "ArrowUp": if(dy !== 1) { dx = 0; dy = -1; } break;
            case "ArrowDown": if(dy !== -1) { dx = 0; dy = 1; } break;
            case "ArrowLeft": if(dx !== 1) { dx = -1; dy = 0; } break;
            case "ArrowRight": if(dx !== -1) { dx = 1; dy = 0; } break;
        }
    });
</script>

</body>
</html>
