<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연결 리스트 기반 스네이크 게임</title>
    <style>
        /* 화면 중앙 정렬 및 배경색 설정 */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
        }

        h1 { margin-bottom: 10px; }

        #game-container {
            position: relative;
            border: 4px solid #16213e;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.2);
        }

        canvas {
            display: block;
            background-color: #0f3460;
        }

        .stats {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>
    <div class="stats">Score: <span id="score">0</span></div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20; // 격자 한 칸의 크기
        const tileCount = canvas.width / gridSize; // 가로/세로 칸 수 (20칸)

        let score = 0;
        let dx = 0; // 수평 속도
        let dy = 0; // 수직 속도

        // 뱀의 몸통 (연결 리스트 역할을 하는 배열)
        // 머리(index 0)부터 꼬리 순서
        let snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];

        // 음식 위치
        let foodX = 5;
        let foodY = 5;

        // 게임 루프 시작
        main();
        createFood();

        // 키보드 입력 이벤트
        document.addEventListener("keydown", changeDirection);

        function main() {
            if (didGameEnd()) {
                alert(`게임 오버! 최종 점수: ${score}`);
                resetGame();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main(); // 다음 프레임 호출
            }, 100); // 0.1초마다 갱신
        }

        function clearCanvas() {
            ctx.fillStyle = "#0f3460";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff7f" : "#4ecca3"; // 머리는 더 밝게
                ctx.strokeStyle = "#1a1a2e";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            // 새로운 머리 위치 계산
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 방향키를 누르지 않은 시작 상태면 움직이지 않음
            if (dx === 0 && dy === 0) return;

            // 새로운 머리를 리스트의 맨 앞에 추가 (Add First)
            snake.unshift(head);

            // 음식을 먹었는지 확인
            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;

            if (didEatFood) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
            } else {
                // 음식을 안 먹었다면 마지막 꼬리 제거 (Remove Last)
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;

            // 벽에 부딪혔는지 확인
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            // 자기 몸에 부딪혔는지 확인
            let hitSelf = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    hitSelf = true;
                    break;
                }
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || hitSelf;
        }

        function createFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            // 음식 위치가 뱀 몸통 위라면 다시 생성
            snake.forEach(part => {
                if (part.x === foodX && part.y === foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff2e63";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // 반대 방향으로 바로 이동할 수 없도록 제어
            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; }
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
            dx = 0; dy = 0;
            createFood();
            main();
        }
    </script>
</body>
</html>
