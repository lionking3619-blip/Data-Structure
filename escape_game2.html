<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>호서대 캠퍼스 탈출: 비밀의 열쇠</title>
    <style>
        :root { --hsu-blue: #004a99; }
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: 'Malgun Gothic', sans-serif; color: white; }
        #game-wrapper { position: relative; margin-top: 20px; border: 4px solid #444; border-radius: 10px; overflow: hidden; width: 800px; height: 500px; }
        
        /* 배경 레이어 */
        #scene-bg { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 0.5s; position: relative; }
        
        /* 상호작용 레이어 */
        .interactable { position: absolute; cursor: pointer; border: 2px dashed rgba(255,255,255,0.3); border-radius: 5px; transition: 0.3s; }
        .interactable:hover { background: rgba(255,255,255,0.2); border-color: white; }
        
        /* 인벤토리 */
        #inventory { width: 800px; height: 80px; background: #333; margin-top: 10px; border-radius: 10px; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .inv-slot { width: 60px; height: 60px; background: #444; margin-right: 10px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 5px; }
        .inv-slot.active { border-color: var(--hsu-blue); background: #555; }

        /* 메시지 창 */
        #msg-box { width: 800px; background: rgba(0,0,0,0.8); padding: 15px; margin-top: 10px; border-radius: 10px; min-height: 50px; text-align: center; border-left: 5px solid var(--hsu-blue); }
        
        /* 다이얼로그 가이드 */
        .guide { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">Hoseo Univ. Escape Adventure</h2>
    <p style="margin: 0 0 10px 0; font-size: 14px; color: #aaa;">화면의 수상한 곳을 클릭하고 아이템을 찾으세요.</p>

    <div id="game-wrapper">
        <div id="scene-bg">
            </div>
        <div class="guide">마우스로 화면을 탐색하세요</div>
    </div>

    <div id="msg-box">안개 낀 호서대 정문입니다. 경비실 어딘가에 정문을 열 방법이 있을 것 같습니다.</div>

    <div id="inventory">
        <div class="inv-slot" id="slot-0"></div>
        <div class="inv-slot" id="slot-1"></div>
        <div class="inv-slot" id="slot-2"></div>
        <div style="margin-left: auto; color: #888;">INVENTORY</div>
    </div>

<script>
    const msgBox = document.getElementById('msg-box');
    const sceneBg = document.getElementById('scene-bg');
    let inventory = [];
    let currentRoom = 'gate';

    const scenes = {
        'gate': {
            bg: 'https://images.unsplash.com/photo-1541339907198-e08756ebafe3?auto=format&fit=crop&w=800&q=80', // 대학교 교문 느낌
            text: "정문입니다. 거대한 독수리상 아래에 무언가 반짝입니다.",
            objects: [
                { name: '독수리 발치', top: '70%', left: '45%', width: '60px', height: '40px', action: () => getItem('녹슨 열쇠', '🗝️') },
                { name: '경비실 문', top: '60%', left: '10%', width: '80px', height: '120px', action: () => useKeyToEnter('library') }
            ]
        },
        'library': {
            bg: 'https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=800&q=80', // 도서관 내부
            text: "학술정보관 로비입니다. 전광판에 암호가 떠 있습니다: '1978' (개교기념일).",
            objects: [
                { name: '컴퓨터', top: '50%', left: '70%', width: '100px', height: '80px', action: () => checkPassword() },
                { name: '뒤로가기', top: '85%', left: '45%', width: '100px', height: '40px', action: () => changeScene('gate') }
            ]
        },
        'exit': {
            bg: 'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=800&q=80',
            text: "탈출 성공! 당신은 호서대 마스터입니다.",
            objects: []
        }
    };

    function changeScene(sceneKey) {
        currentRoom = sceneKey;
        const scene = scenes[sceneKey];
        sceneBg.style.backgroundImage = `url(${scene.bg})`;
        msgBox.innerText = scene.text;
        
        // 기존 오브젝트 삭제
        sceneBg.innerHTML = '';
        
        // 새 오브젝트 생성
        scene.objects.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'interactable';
            div.style.top = obj.top;
            div.style.left = obj.left;
            div.style.width = obj.width;
            div.style.height = obj.height;
            div.onclick = obj.action;
            sceneBg.appendChild(div);
        });
    }

    function getItem(name, icon) {
        if (!inventory.includes(name)) {
            inventory.push(name);
            updateInventory();
            msgBox.innerText = `[${name}]을(를) 획득했습니다! 어딘가 쓸 곳이 있을 것 같습니다.`;
        } else {
            msgBox.innerText = "이미 조사한 곳입니다.";
        }
    }

    function updateInventory() {
        inventory.forEach((item, index) => {
            const slot = document.getElementById(`slot-${index}`);
            if (index === 0) slot.innerText = '🗝️';
            if (index === 1) slot.innerText = '💾';
            slot.classList.add('active');
        });
    }

    function useKeyToEnter(nextScene) {
        if (inventory.includes('녹슨 열쇠')) {
            msgBox.innerText = "열쇠가 맞습니다! 도서관으로 진입합니다.";
            setTimeout(() => changeScene(nextScene), 1000);
        } else {
            msgBox.innerText = "문이 굳게 잠겨 있습니다. 열쇠가 필요할 것 같습니다.";
        }
    }

    function checkPassword() {
        const pw = prompt("컴퓨터 암호를 입력하세요 (4자리 숫자):");
        if (pw === '1978') {
            msgBox.innerText = "접속 성공! 정문 시스템을 해제했습니다. 이제 나갈 수 있습니다!";
            inventory.push('보안카드');
            updateInventory();
            setTimeout(() => {
                alert("정문 락이 해제되었습니다!");
                changeScene('exit');
            }, 1000);
        } else {
            msgBox.innerText = "암호가 틀렸습니다. 힌트: 호서대학교 개교연도는?";
        }
    }

    // 초기 실행
    changeScene('gate');
</script>

</body>
</html>
