<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>호서대 아산캠퍼스 대탈출</title>
    <style>
        :root { --hsu-gold: #b3995d; --hsu-blue: #004a99; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        
        /* 메인 게임 화면 */
        #viewport { position: relative; width: 1000px; height: 600px; margin: 20px auto; border: 5px solid #333; overflow: hidden; background: #222; }
        #scene { width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 0.8s; }
        
        /* 인벤토리 시스템 */
        #inventory-bar { width: 1000px; height: 100px; margin: 0 auto; background: #1a1a1a; display: flex; align-items: center; padding: 10px; border: 2px solid #444; box-sizing: border-box; }
        .slot { width: 80px; height: 80px; background: #2a2a2a; border: 2px solid #555; margin-right: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot.selected { border-color: var(--hsu-gold); box-shadow: 0 0 10px var(--hsu-gold); }
        .item-img { max-width: 90%; max-height: 90%; pointer-events: none; }

        /* 상호작용 요소 */
        .obj { position: absolute; cursor: pointer; transition: transform 0.2s; border-radius: 4px; }
        .obj:hover { transform: scale(1.05); outline: 2px solid rgba(255,255,255,0.5); }
        
        /* 텍스트 박스 */
        #msg-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 10px; border-left: 8px solid var(--hsu-blue); font-size: 16px; line-height: 1.5; pointer-events: none; }
        
        /* 다이얼 패드 / UI 요소 */
        #keypad { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; border: 4px solid var(--hsu-gold); z-index: 100; }
        .key { width: 50px; height: 50px; background: #444; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; font-weight: bold; }
        .key:active { background: #666; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="scene"></div>
    <div id="keypad">
        <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
        <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
        <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
        <div class="key" style="grid-column: span 3; background: #900;" onclick="closeKeypad()">CLOSE</div>
    </div>
    <div id="msg-box">로딩 중...</div>
</div>

<div id="inventory-bar">
    <div class="slot" onclick="selectSlot(0)" id="slot0"></div>
    <div class="slot" onclick="selectSlot(1)" id="slot1"></div>
    <div class="slot" onclick="selectSlot(2)" id="slot2"></div>
    <div class="slot" onclick="selectSlot(3)" id="slot3"></div>
    <div class="slot" onclick="selectSlot(4)" id="slot4"></div>
</div>

<script>
    let currentStage = 1;
    let inventory = [];
    let selectedItem = null;
    let keypadTarget = "";
    let codeInput = "";

    const stages = {
        1: {
            name: "정문 (Main Gate)",
            bg: "https://images.unsplash.com/photo-1590012385455-8f76b7497d95?q=80&w=1000", // 캠퍼스 정문 유사 이미지
            text: "정문 초소의 유리창이 깨져 있습니다. 안쪽에 무언가 보입니다.",
            objs: [
                { id: 'key_box', img: '📦', top: '70%', left: '20%', w: '60px', h: '60px', act: () => addItem('초소 열쇠', '🔑') },
                { id: 'gate_lock', img: '🔒', top: '65%', left: '80%', w: '50px', h: '50px', act: () => useItemOn('초소 열쇠', 2) }
            ]
        },
        2: {
            name: "대학교회 (University Church)",
            bg: "https://images.unsplash.com/photo-1548625361-195feee1048e?q=80&w=1000",
            text: "고요한 교회 앞입니다. 벤치 밑에 종이 조각이 떨어져 있습니다.",
            objs: [
                { id: 'paper', img: '📜', top: '80%', left: '60%', w: '40px', h: '40px', act: () => { addItem('종이 조각', '📜'); showMsg("종이에는 '벤처의 시작은 7...' 이라고 적혀 있습니다."); } },
                { id: 'door', img: '🚪', top: '50%', left: '48%', w: '60px', h: '120px', act: () => nextStage(3) }
            ]
        },
        3: {
            name: "학술정보관 (Library)",
            bg: "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1000",
            text: "중앙 도서관 로비입니다. 엘리베이터가 잠겨 있습니다. 4자리 코드가 필요합니다.",
            objs: [
                { id: 'panel', img: '📟', top: '55%', left: '55%', w: '30px', h: '50px', act: () => openKeypad('1978', 4) }
            ]
        },
        // ... (4~9단계 로직 반복) ...
        10: {
            name: "강석규교육관 (Final)",
            bg: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1000",
            text: "마지막 관문입니다. 설립자의 비석 옆에 '졸업장'이 놓여 있습니다. 하지만 방어막이 쳐져 있습니다.",
            objs: [
                { id: 'diploma', img: '🎓', top: '45%', left: '50%', w: '80px', h: '80px', act: () => endGame() }
            ]
        }
    };

    function renderStage() {
        const s = stages[currentStage];
        const scene = document.getElementById('scene');
        scene.style.opacity = 0;
        
        setTimeout(() => {
            scene.style.backgroundImage = `url(${s.bg})`;
            scene.innerHTML = '';
            s.objs.forEach(o => {
                const el = document.createElement('div');
                el.className = 'obj';
                el.style.top = o.top; el.style.left = o.left;
                el.style.width = o.w; el.style.height = o.h;
                el.innerHTML = `<span style="font-size:30px">${o.img}</span>`;
                el.onclick = o.act;
                scene.appendChild(el);
            });
            showMsg(`${currentStage}/10 단계: ${s.name} - ${s.text}`);
            scene.style.opacity = 1;
        }, 500);
    }

    function addItem(name, icon) {
        if (inventory.length < 5) {
            inventory.push({name, icon});
            updateInvUI();
            showMsg(`아이템 획득: [${name}]`);
        }
    }

    function updateInvUI() {
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot${i}`);
            slot.innerHTML = inventory[i] ? `<span class="item-img">${inventory[i].icon}</span>` : '';
        }
    }

    function selectSlot(i) {
        if(inventory[i]) {
            selectedItem = inventory[i].name;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(`slot${i}`).classList.add('selected');
            showMsg(`[${selectedItem}] 선택됨. 사용할 곳을 클릭하세요.`);
        }
    }

    function useItemOn(required, next) {
        if (selectedItem === required) {
            showMsg("잠금이 해제되었습니다!");
            inventory = inventory.filter(item => item.name !== required);
            updateInvUI();
            selectedItem = null;
            setTimeout(() => nextStage(next), 1000);
        } else {
            showMsg("아무 일도 일어나지 않았습니다. 적절한 아이템이 필요합니다.");
        }
    }

    function openKeypad(target, next) {
        keypadTarget = target;
        document.getElementById('keypad').style.display = 'grid';
    }

    function pressKey(num) {
        codeInput += num;
        showMsg(`입력 중... [ ${codeInput} ]`);
        if(codeInput.length === 4) {
            if(codeInput === keypadTarget) {
                showMsg("ACCESS GRANTED.");
                closeKeypad();
                nextStage(currentStage + 1);
            } else {
                showMsg("WRONG CODE.");
                codeInput = "";
            }
        }
    }

    function nextStage(n) {
        if(n <= 10) {
            currentStage = n;
            renderStage();
        }
    }

    function showMsg(t) { document.getElementById('msg-box').innerText = t; }
    function closeKeypad() { document.getElementById('keypad').style.display = 'none'; codeInput = ""; }
    function endGame() { 
        document.body.innerHTML = "<div style='text-align:center; padding-top:20%;'><h1>🎉 졸업 성공!</h1><p>호서대학교의 모든 시련을 통과하셨습니다.</p></div>"; 
    }

    // Start
    renderStage();
</script>
</body>
</html>
