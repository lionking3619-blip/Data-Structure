<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 검색 - Word Search Quest</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #game-container {
            display: flex;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            align-items: center;
        }

        /* 단어 목록 스타일 */
        #word-list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .word-item {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .word-found {
            text-decoration: line-through;
            color: #ccc;
        }

        /* 게임 보드 및 캔버스 레이어 */
        #board-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
        }

        /* 드래그 및 정답 선을 그릴 Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 마우스 이벤트를 그리드로 통과시킴 */
        }
    </style>
</head>
<body>

    <h1>단어 검색 (Word Search)</h1>
    
    <div id="game-container">
        <div id="word-list-container">
            <h3>찾을 단어 목록</h3>
            <div id="word-list"></div>
        </div>

        <div id="board-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="grid-container" id="grid"></div>
        </div>
    </div>

    <script>
        // 1. 게임 데이터 설정
        const targetWords = ["HIDDEN", "THEME", "WORD", "RELAX", "BRAIN", "LOVE", "LETTERS"];
        const gridSize = 10;
        
        // 정답 시 순서대로 사용할 색상 배열 (반투명 처리를 위해 rgba 사용)
        const colors = [
            'rgba(46, 204, 113, 0.5)',  // 초록
            'rgba(155, 89, 182, 0.5)',  // 보라
            'rgba(52, 152, 219, 0.5)',  // 파랑
            'rgba(241, 196, 15, 0.5)',  // 노랑
            'rgba(231, 76, 60, 0.5)',   // 빨강
            'rgba(230, 126, 34, 0.5)',  // 주황
            'rgba(26, 188, 156, 0.5)'   // 청록
        ];
        let colorIndex = 0;

        // 10x10 보드판 생성 (기본 알파벳 채우기)
        const letters = [
            ['A','C','O','H','I','D','D','E','N','J'],
            ['Z','N','T','H','E','M','E','K','Z','F'],
            ['D','G','L','W','I','R','U','A','M','T'],
            ['B','W','O','R','D','H','F','H','E','Y'],
            ['R','E','J','F','C','R','E','L','A','X'],
            ['A','R','O','R','A','C','Z','O','B','M'],
            ['I','B','A','E','T','Z','J','V','E','S'],
            ['N','E','A','E','U','F','X','E','P','O'],
            ['S','N','L','P','C','B','K','V','G','Q'],
            ['W','L','E','T','T','E','R','S','P','A']
        ];

        const gridContainer = document.getElementById('grid-container');
        const wordListDiv = document.getElementById('word-list');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let isDragging = false;
        let startCell = null;
        let currentCell = null;
        const foundLines = []; // 이미 맞춘 정답 선들의 정보 저장

        // 2. UI 초기화
        function initGame() {
            // 단어 목록 표시
            targetWords.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.id = `word-${word}`;
                div.innerText = word;
                wordListDiv.appendChild(div);
            });

            // 글자 그리드 배치
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = letters[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    // 마우스 이벤트 바인딩
                    cell.addEventListener('mousedown', onMouseDown);
                    cell.addEventListener('mouseenter', onMouseEnter);
                    gridContainer.appendChild(cell);
                }
            }
            window.addEventListener('mouseup', onMouseUp);
            
            draw();
        }

        // 3. 셀 중심 좌표 계산 유틸리티
        function getCellCenter(row, col) {
            const cellSize = canvas.width / gridSize;
            return {
                x: col * cellSize + cellSize / 2,
                y: row * cellSize + cellSize / 2
            };
        }

        // 4. 직선 방향(가로, 세로, 대각선) 제약 함수
        function getConstrainedEndCell(start, current) {
            const dr = current.row - start.row;
            const dc = current.col - start.col;
            
            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                return current; // 이미 완벽한 직선 상태
            }

            // 가장 가까운 직선/대각선 방향으로 보정
            if (Math.abs(dr) > Math.abs(dc)) {
                return { row: current.row, col: start.col + Math.round(dc / Math.abs(dr)) * Math.abs(dr) };
            } else {
                return { row: start.row + Math.round(dr / Math.abs(dc)) * Math.abs(dc), col: current.col };
            }
        }

        // 5. 마우스 이벤트 핸들러
        function onMouseDown(e) {
            isDragging = true;
            startCell = {
                row: parseInt(e.target.dataset.row),
                col: parseInt(e.target.dataset.col)
            };
            currentCell = startCell;
            draw();
        }

        function onMouseEnter(e) {
            if (!isDragging) return;
            const tempCell = {
                row: parseInt(e.target.dataset.row),
                col: parseInt(e.target.dataset.col)
            };
            currentCell = getConstrainedEndCell(startCell, tempCell);
            draw();
        }

        function onMouseUp() {
            if (!isDragging) return;
            isDragging = false;

            // 선택된 텍스트 추출
            const selectedWord = getSelectedWord(startCell, currentCell);
            const reversedWord = selectedWord.split('').reverse().join('');

            let matchedWord = null;
            if (targetWords.includes(selectedWord) && !isWordAlreadyFound(selectedWord)) {
                matchedWord = selectedWord;
            } else if (targetWords.includes(reversedWord) && !isWordAlreadyFound(reversedWord)) {
                matchedWord = reversedWord;
            }

            if (matchedWord) {
                // 단어 매칭 성공 시 선 고정 및 색상 교체
                foundLines.push({
                    start: { ...startCell },
                    end: { ...currentCell },
                    color: colors[colorIndex]
                });
                
                // 다음 색상으로 변경
                colorIndex = (colorIndex + 1) % colors.length;

                // UI 업데이트
                document.getElementById(`word-${matchedWord}`).classList.add('word-found');
            }

            startCell = null;
            currentCell = null;
            draw();
        }

        // 6. 좌표 간의 단어 획득
        function getSelectedWord(start, end) {
            if (!start || !end) return "";
            let r = start.row;
            let c = start.col;
            const dr = Math.sign(end.row - start.row);
            const dc = Math.sign(end.col - start.col);
            
            let word = "";
            
            while (true) {
                if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                    word += letters[r][c];
                }
                if (r === end.row && c === end.col) break;
                r += dr;
                c += dc;
                // 무한루프 방지 안전장치
                if (Math.abs(r) > 20 || Math.abs(c) > 20) break;
            }
            return word;
        }

        function isWordAlreadyFound(word) {
            const el = document.getElementById(`word-${word}`);
            return el && el.classList.contains('word-found');
        }

        // 7. 화면 그리기 (렌더링 캔버스)
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 7-1. 기존에 맞춘 정답 선들 그리기
            foundLines.forEach(line => {
                drawLine(line.start, line.end, line.color);
            });

            // 7-2. 현재 드래그 중인 선 그리기
            if (isDragging && startCell && currentCell) {
                // 현재 드래그 선은 테두리를 주기 위해 진하게 표시 (외곽선 + 투명 채우기 효과)
                drawLine(startCell, currentCell, 'rgba(0, 0, 0, 0.15)', 36); // 외곽 어두운 선 배경 효과
                drawLine(startCell, currentCell, colors[colorIndex], 30);   // 실제 드래그 컬러 선
            }
        }

        // 공통 선 그리 기 함수
        function drawLine(start, end, color, width = 30) {
            const startPos = getCellCenter(start.row, start.col);
            const endPos = getCellCenter(end.row, end.col);

            ctx.beginPath();
            ctx.lineCap = "round";
            ctx.lineWidth = width;
            ctx.strokeStyle = color;
            ctx.moveTo(startPos.x, startPos.y);
            ctx.lineTo(endPos.x, endPos.y);
            ctx.stroke();
            ctx.closePath();
        }

        // 게임 시작 실행
        initGame();
    </script>
</body>
</html>
