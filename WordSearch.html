<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 검색 - 무한 스테이지 Quest</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        h2 {
            color: #3498db;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #game-container {
            display: flex;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            align-items: center;
        }

        /* 단어 목록 스타일 */
        #word-list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 150px;
        }

        .word-item {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .word-found {
            text-decoration: line-through;
            color: #ccc;
        }

        /* 게임 보드 및 캔버스 레이어 */
        #board-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
        }

        /* 드래그 및 정답 선을 그릴 Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>단어 검색 (Word Search)</h1>
    <h2 id="stage-indicator">Stage 1</h2>
    
    <div id="game-container">
        <div id="word-list-container">
            <h3>찾을 단어 목록</h3>
            <div id="word-list"></div>
        </div>

        <div id="board-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="grid-container"></div>
        </div>
    </div>

    <script>
        // 1. 단어 풀 생성 (여기에 원하는 영단어를 마음껏 추가해도 됩니다)
        const wordPool = [
            "HIDDEN", "THEME", "WORD", "RELAX", "BRAIN", "LOVE", "LETTERS", "QUEST", "GAME", "COFFEE",
            "APPLE", "BANANA", "ORANGE", "CHERRY", "MELON", "LEMON", "PLANET", "ROCKET", "SPACE", "ROBOT",
            "GUITAR", "PIANO", "MUSIC", "FLOWER", "GARDEN", "SUMMER", "WINTER", "SPRING", "AUTUMN", "HAPPY",
            "SMILE", "ANIMAL", "TIGER", "ZEBRA", "SNAKE", "HOUSE", "CLOCK", "TRAIN", "PLANE", "TRUCK",
            "WATER", "JUICE", "BREAD", "CHEESE", "PIZZA", "GREEN", "BLUE", "YELLOW", "WHITE", "BLACK"
        ];

        const gridSize = 10;
        let currentStage = 1;
        let targetWords = [];
        let letters = [];

        // 정답 시 순서대로 사용할 색상 배열
        const colors = [
            'rgba(46, 204, 113, 0.5)',  // 초록
            'rgba(155, 89, 182, 0.5)',  // 보라
            'rgba(52, 152, 219, 0.5)',  // 파랑
            'rgba(241, 196, 15, 0.5)',  // 노랑
            'rgba(231, 76, 60, 0.5)',   // 빨강
            'rgba(230, 126, 34, 0.5)',  // 주황
            'rgba(26, 188, 156, 0.5)'   // 청록
        ];
        let colorIndex = 0;

        const gridContainer = document.getElementById('grid-container');
        const wordListDiv = document.getElementById('word-list');
        const stageIndicator = document.getElementById('stage-indicator');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let isDragging = false;
        let startCell = null;
        let currentCell = null;
        let foundLines = []; 

        // 2. 새로운 스테이지 생성 및 초기화 함수
        function startNewStage() {
            // 변수 및 UI 초기화
            foundLines = [];
            gridContainer.innerHTML = '';
            wordListDiv.innerHTML = '';
            stageIndicator.innerText = `Stage ${currentStage}`;

            // 풀에서 랜덤하게 5~6개 단어 선택
            targetWords = getRandomWordsFromPool(5);

            // 랜덤 단어 배치 알고리즘 실행 및 빈칸 채우기
            letters = generateRandomPuzzleGrid(targetWords);

            // 화면에 단어 목록 추가
            targetWords.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.id = `word-${word}`;
                div.innerText = word;
                wordListDiv.appendChild(div);
            });

            // 화면에 글자 그리드 배치
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = letters[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    cell.addEventListener('mousedown', onMouseDown);
                    cell.addEventListener('mouseenter', onMouseEnter);
                    gridContainer.appendChild(cell);
                }
            }
            
            draw();
        }

        // 3. 무작위 단어 추출기
        function getRandomWordsFromPool(count) {
            const shuffled = [...wordPool].sort(() => 0.5 - Math.random());
            // 10x10 격자이므로 너무 긴 단어 필터링 후 지정된 개수만큼 선택
            return shuffled.filter(w => w.length <= gridSize).slice(0, count);
        }

        // 4. 단어 랜덤 배치 알고리즘 (가로, 세로, 대각선 4방향)
        function generateRandomPuzzleGrid(words) {
            // 빈 격자 생성
            let grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(''));
            
            const directions = [
                [0, 1],   // 가로 (우향)
                [1, 0],   // 세로 (하향)
                [1, 1],   // 대각선 (우하향)
                [-1, 1]   // 대각선 (우상향)
            ];

            words.forEach(word => {
                let placed = false;
                let attempts = 0;

                while (!placed && attempts < 100) {
                    const dir = directions[Math.floor(Math.random() * directions.length)];
                    const r = Math.floor(Math.random() * gridSize);
                    const c = Math.floor(Math.random() * gridSize);

                    // 끝 부분 좌표 계산하여 범위 안인지 확인
                    const endR = r + dir[0] * (word.length - 1);
                    const endC = c + dir[1] * (word.length - 1);

                    if (endR >= 0 && endR < gridSize && endC >= 0 && endC < gridSize) {
                        let canPlace = true;
                        
                        // 충돌 검사 (빈칸이거나 이미 같은 스펠링이 들어있는지)
                        for (let i = 0; i < word.length; i++) {
                            const currR = r + dir[0] * i;
                            const currC = c + dir[1] * i;
                            if (grid[currR][currC] !== '' && grid[currR][currC] !== word[i]) {
                                canPlace = false;
                                break;
                            }
                        }

                        // 배치 실행
                        if (canPlace) {
                            for (let i = 0; i < word.length; i++) {
                                const currR = r + dir[0] * i;
                                const currC = c + dir[1] * i;
                                grid[currR][currC] = word[i];
                            }
                            placed = true;
                        }
                    }
                    attempts++;
                }
            });

            // 단어가 들어가지 않은 빈 공간을 랜덤 알파벳(A~Z)으로 채우기
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    }
                }
            }
            return grid;
        }

        // 5. 셀 중심 좌표 계산 유틸리티
        function getCellCenter(row, col) {
            const cellSize = canvas.width / gridSize;
            return {
                x: col * cellSize + cellSize / 2,
                y: row * cellSize + cellSize / 2
            };
        }

        // 6. 직선 방향(가로, 세로, 대각선) 제약 함수
        function getConstrainedEndCell(start, current) {
            const dr = current.row - start.row;
            const dc = current.col - start.col;
            
            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                return current; 
            }

            if (Math.abs(dr) > Math.abs(dc)) {
                return { row: current.row, col: start.col + Math.round(dc / Math.abs(dr)) * Math.abs(dr) };
            } else {
                return { row: start.row + Math.round(dr / Math.abs(dc)) * Math.abs(dc), col: current.col };
            }
        }

        // 7. 마우스 이벤트 핸들러
        function onMouseDown(e) {
            isDragging = true;
            startCell = {
                row: parseInt(e.target.dataset.row),
                col: parseInt(e.target.dataset.col)
            };
            currentCell = startCell;
            draw();
        }

        function onMouseEnter(e) {
            if (!isDragging) return;
            const tempCell = {
                row: parseInt(e.target.dataset.row),
                col: parseInt(e.target.dataset.col)
            };
            currentCell = getConstrainedEndCell(startCell, tempCell);
            draw();
        }

        function onMouseUp() {
            if (!isDragging) return;
            isDragging = false;

            const selectedWord = getSelectedWord(startCell, currentCell);
            const reversedWord = selectedWord.split('').reverse().join('');

            let matchedWord = null;
            if (targetWords.includes(selectedWord) && !isWordAlreadyFound(selectedWord)) {
                matchedWord = selectedWord;
            } else if (targetWords.includes(reversedWord) && !isWordAlreadyFound(reversedWord)) {
                matchedWord = reversedWord;
            }

            if (matchedWord) {
                foundLines.push({
                    start: { ...startCell },
                    end: { ...currentCell },
                    color: colors[colorIndex]
                });
                
                colorIndex = (colorIndex + 1) % colors.length;
                document.getElementById(`word-${matchedWord}`).classList.add('word-found');

                // 모든 단어를 다 찾았는지 확인 (스테이지 클리어 체크)
                checkStageClear();
            }

            startCell = null;
            currentCell = null;
            draw();
        }

        // 8. 스테이지 클리어 판별 및 다음 스테이지 자동 이동
        function checkStageClear() {
            const foundCount = document.querySelectorAll('.word-found').length;
            if (foundCount === targetWords.length) {
                setTimeout(() => {
                    alert(`🎉 축하합니다! Stage ${currentStage}를 클리어하셨습니다!`);
                    currentStage++;
                    startNewStage();
                }, 400); // 정답 선이 그려지는 것을 보여준 뒤 넘어감
            }
        }

        // 9. 좌표 간의 단어 획득
        function getSelectedWord(start, end) {
            if (!start || !end) return "";
            let r = start.row;
            let c = start.col;
            const dr = Math.sign(end.row - start.row);
            const dc = Math.sign(end.col - start.col);
            
            let word = "";
            
            while (true) {
                if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                    word += letters[r][c];
                }
                if (r === end.row && c === end.col) break;
                r += dr;
                c += dc;
                if (Math.abs(r) > 20 || Math.abs(c) > 20) break; // 안전장치
            }
            return word;
        }

        function isWordAlreadyFound(word) {
            const el = document.getElementById(`word-${word}`);
            return el && el.classList.contains('word-found');
        }

        // 10. 화면 그리기 (렌더링 캔버스)
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 기존 맞춘 정답 선들 유지
            foundLines.forEach(line => {
                drawLine(line.start, line.end, line.color);
            });

            // 현재 드래그 중인 선 실시간 렌더링
            if (isDragging && startCell && currentCell) {
                drawLine(startCell, currentCell, 'rgba(0, 0, 0, 0.15)', 36); // 어두운 진한 테두리 효과
                drawLine(startCell, currentCell, colors[colorIndex], 30);   // 불투명한 채우기 색상
            }
        }

        function drawLine(start, end, color, width = 30) {
            const startPos = getCellCenter(start.row, start.col);
            const endPos = getCellCenter(end.row, end.col);

            ctx.beginPath();
            ctx.lineCap = "round";
            ctx.lineWidth = width;
            ctx.strokeStyle = color;
            ctx.moveTo(startPos.x, startPos.y);
            ctx.lineTo(endPos.x, endPos.y);
            ctx.stroke();
            ctx.closePath();
        }

        // 첫 실행 등록
        window.addEventListener('mouseup', onMouseUp);
        startNewStage();
    </script>
</body>
</html>
