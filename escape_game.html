<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고대 유적의 비밀: 스택 추리 탈출</title>
    <style>
        :root {
            --ancient-gold: #d4af37;
            --stone-gray: #4b4b4b;
            --deep-brown: #2c1e16;
        }
        body {
            background-color: #1a1a1a;
            color: #e0d8b0;
            font-family: 'Malgun Gothic', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-box {
            width: 90%;
            max-width: 600px;
            background: var(--deep-brown);
            padding: 25px;
            border: 4px solid var(--ancient-gold);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .screen {
            background: #000;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            min-height: 120px;
            border: 1px inset var(--ancient-gold);
        }
        .clue-text { font-style: italic; color: #ffeb3b; margin-top: 10px; }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            background: #333;
            border: 1px solid var(--ancient-gold);
            color: white;
            font-size: 1.1em;
        }
        button {
            padding: 10px 20px;
            background: var(--ancient-gold);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #fff; }
        button:disabled { background: #555; }

        .stack-label { font-weight: bold; margin-bottom: 10px; display: block; }
        #path-stack {
            display: flex;
            flex-direction: column-reverse;
            gap: 5px;
            background: #222;
            padding: 10px;
            border-radius: 4px;
            min-height: 100px;
        }
        .stack-item {
            background: var(--stone-gray);
            padding: 8px;
            text-align: center;
            border: 1px solid #666;
            animation: pushAnim 0.4s ease-out;
        }
        @keyframes pushAnim {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <h2>📜 고대 태양신의 비밀번호</h2>
    
    <div id="game-box">
        <div class="screen" id="display">
            </div>

        <div class="input-group">
            <input type="text" id="pw-input" placeholder="비밀번호 입력..." onkeyup="if(window.event.keyCode==13){checkPassword()}">
            <button onclick="checkPassword()">확인 (Push)</button>
        </div>

        <button id="back-btn" onclick="goBack()" style="width: 100%; margin-bottom: 20px;">이전 방으로 돌아가기 (Pop)</button>

        <span class="stack-label">현재 탐험 경로 스택:</span>
        <div id="path-stack"></div>
    </div>

    <script>
        // 방 정보 데이터 (추리 요소)
        const rooms = [
            {
                name: "입구 (시작)",
                desc: "유적의 문이 굳게 닫혀 있습니다. 문 위에는 <b>'낮이 가고 밤이 오면 뜨는 것'</b>이 그려져 있습니다.",
                clue: "힌트: 밤하늘을 밝히는 두 글자",
                pw: "달빛"
            },
            {
                name: "상형문자의 방",
                desc: "벽에 숫자들이 적혀 있습니다. '1, 2, 4, 8, ...' 다음 숫자가 이 방의 열쇠입니다.",
                clue: "힌트: 2의 거듭제곱입니다.",
                pw: "16"
            },
            {
                name: "거울의 복도",
                desc: "거울 속에 글자가 거꾸로 적혀 있습니다. [ <b>O F I L</b> ] 이 글자를 올바른 순서로 배열하세요.",
                clue: "힌트: 이 게임의 핵심 알고리즘 원리(영문 4글자)입니다.",
                pw: "LIFO"
            },
            {
                name: "마지막 제단",
                desc: "황금 조각상 아래에 문구가 있습니다. '시작은 <b>달빛</b>이었고, 끝은 <b>보물</b>이다.' 보물을 한글로 입력하세요.",
                clue: "힌트: 보물",
                pw: "보물"
            }
        ];

        let currentStage = 0;
        let pathStack = ["입구 (시작)"];

        function updateUI() {
            const display = document.getElementById('display');
            const stackView = document.getElementById('path-stack');
            const backBtn = document.getElementById('back-btn');

            // 화면 설명 업데이트
            if (currentStage < rooms.length) {
                display.innerHTML = `
                    <strong>[${rooms[currentStage].name}]</strong><br>
                    ${rooms[currentStage].desc}
                    <div class="clue-text">${rooms[currentStage].clue}</div>
                `;
            } else {
                display.innerHTML = "<strong>🎊 탈출 성공! 🎊</strong><br>모든 수수께끼를 풀고 유적의 보물을 손에 넣었습니다!";
                document.querySelector('.input-group').style.display = 'none';
            }

            // 스택 시각화
            stackView.innerHTML = '';
            pathStack.forEach(room => {
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerText = room;
                stackView.appendChild(div);
            });

            // 뒤로가기 버튼 제어 (Pop)
            backBtn.disabled = pathStack.length <= 1 || currentStage >= rooms.length;
        }

        function checkPassword() {
            const input = document.getElementById('pw-input');
            const val = input.value.trim();

            if (currentStage < rooms.length) {
                if (val === rooms[currentStage].pw) {
                    currentStage++;
                    if (currentStage < rooms.length) {
                        pathStack.push(rooms[currentStage].name); // 성공 시 스택에 Push
                    } else {
                        pathStack.push("보물 방");
                    }
                    input.value = '';
                    updateUI();
                } else {
                    alert("비밀번호가 틀렸습니다. 배경을 다시 확인해보세요!");
                }
            }
        }

        function goBack() {
            if (pathStack.length > 1) {
                pathStack.pop(); // 스택에서 마지막 방 제거 (Pop)
                currentStage--;
                updateUI();
            }
        }

        // 초기 실행
        updateUI();
    </script>
</body>
</html>
