<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고대 유적 탐사 기록 - Stack Explorer</title>
    <style>
        body {
            background-color: #f4f1ea;
            color: #4a3a2a;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            padding: 30px;
            border: 2px solid #c2b280;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .display-area {
            background: #fafafa;
            padding: 20px;
            border-left: 5px solid #c2b280;
            margin-bottom: 20px;
            min-height: 80px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .stack-containers {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 20px;
        }
        .stack-view {
            flex: 1;
            background: #fdfdfd;
            padding: 15px;
            border: 1px dashed #d1c4a8;
            border-radius: 10px;
            text-align: center;
        }
        .stack-list {
            display: flex;
            flex-direction: column-reverse; /* 아래에서 위로 쌓이는 시각화 */
            gap: 8px;
            min-height: 200px;
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .stack-item {
            background: #eaddca;
            color: #5d4037;
            padding: 10px;
            font-size: 0.9em;
            border-radius: 5px;
            border: 1px solid #d4c5b0;
            animation: fadeIn 0.4s ease;
        }
        .item-node { background: #d5e8d4; border-color: #82b366; } /* 아이템은 다른 색상 */

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            cursor: pointer;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #6d4c41; transform: translateY(-2px); }
        button:disabled { background: #d7ccc8; cursor: not-allowed; transform: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>📜 고대 유적 탐사 도구 (Stack)</h1>
    
    <div id="game-container">
        <div class="display-area" id="narrative">
            유적 입구에 도착했습니다. 탐사 경로와 발견한 유물은 모두 <strong>스택(Stack)</strong> 구조로 기록됩니다. <br>
            안쪽으로 이동하여 조사를 시작하세요.
        </div>

        <div class="controls">
            <button id="forward-btn" onclick="exploreNext()">깊숙이 이동 (Push Path)</button>
            <button id="item-btn" onclick="findItem()">유물 기록 (Push Item)</button>
            <button id="back-btn" onclick="goBack()" disabled>이전 구역으로 (Pop Path)</button>
            <button id="use-btn" onclick="useItem()" disabled>최근 유물 정리 (Pop Item)</button>
        </div>

        <div class="stack-containers">
            <div class="stack-view">
                <strong>📍 탐사 경로 (Path)</strong>
                <div id="path-stack" class="stack-list"></div>
            </div>
            <div class="stack-view">
                <strong>🏺 수집된 유물 (Inventory)</strong>
                <div id="item-stack" class="stack-list"></div>
            </div>
        </div>
    </div>

    <script>
        // 기초 스택 로직
        class SimpleStack {
            constructor() { this.storage = []; }
            push(val) { this.storage.push(val); }
            pop() { return this.storage.pop(); }
            peek() { return this.storage[this.storage.length - 1]; }
            size() { return this.storage.length; }
            isEmpty() { return this.storage.length === 0; }
        }

        const pathStack = new SimpleStack();
        const itemStack = new SimpleStack();
        
        const rooms = ["상형문자의 방", "별의 제단", "지혜의 안뜰", "침묵의 통로", "깊은 연못"];
        const artifacts = ["청동 거울", "진흙 판", "금색 펜던트", "낡은 지도", "수정 조각"];

        // 초기 시작점 설정
        pathStack.push("유적 입구");
        updateUI();

        function updateUI() {
            // 경로 업데이트
            const pathList = document.getElementById('path-stack');
            pathList.innerHTML = '';
            pathStack.storage.forEach(p => {
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerText = p;
                pathList.appendChild(div);
            });

            // 아이템 업데이트
            const itemList = document.getElementById('item-stack');
            itemList.innerHTML = '';
            itemStack.storage.forEach(i => {
                const div = document.createElement('div');
                div.className = 'stack-item item-node';
                div.innerText = i;
                itemList.appendChild(div);
            });

            // 버튼 상태 제어
            document.getElementById('back-btn').disabled = pathStack.size() <= 1;
            document.getElementById('use-btn').disabled = itemStack.isEmpty();
            document.getElementById('forward-btn').disabled = pathStack.size() > rooms.length;
        }

        function exploreNext() {
            const nextRoom = rooms[pathStack.size() - 1];
            pathStack.push(nextRoom);
            renderText(`[${nextRoom}]에 들어섰습니다. 새로운 비석이 보입니다.`);
            updateUI();
        }

        function findItem() {
            const newItem = artifacts[Math.floor(Math.random() * artifacts.length)];
            itemStack.push(newItem);
            renderText(`유물 [${newItem}]을(를) 발견하여 가방 제일 위에 담았습니다.`);
            updateUI();
        }

        function goBack() {
            const current = pathStack.pop();
            const previous = pathStack.peek();
            renderText(`[${current}] 조사를 마치고 [${previous}](으)로 되돌아왔습니다.`);
            
            if (pathStack.size() === 1) {
                renderText("모든 조사를 마치고 입구로 돌아왔습니다. 안전한 탐사였습니다!");
            }
            updateUI();
        }

        function useItem() {
            const item = itemStack.pop();
            renderText(`가방 맨 위에 있던 [${item}]을(를) 꺼내어 조사 일지에 기록했습니다.`);
            updateUI();
        }

        function renderText(txt) {
            document.getElementById('narrative').innerHTML = txt;
        }
    </script>
</body>
</html>
