<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고대 유적: 무지개 제단의 비밀</title>
    <style>
        :root {
            --gold: #ffd700;
            --stone: #3d3d3d;
        }
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 게임 메인 화면 (유적 배경) */
        #game-scene {
            position: relative;
            width: 800px;
            height: 450px;
            background: linear-gradient(to bottom, #2c1e16, #4b3621);
            border: 10px solid #222;
            overflow: hidden;
            cursor: default;
        }
        /* 배경 벽화 (무지개 힌트) */
        #mural {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            opacity: 0.3;
            filter: blur(5px);
            border-radius: 50px 50px 0 0;
            cursor: pointer;
        }
        #mural:hover { opacity: 0.8; filter: blur(0); }

        /* 클릭 가능한 보석들 */
        .gem {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50% 0 50% 0;
            transform: rotate(45deg);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            transition: transform 0.2s;
        }
        .gem:hover { transform: rotate(45deg) scale(1.2); }

        /* 제단 (스택 시각화 영역) */
        #altar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 250px;
            background: rgba(0,0,0,0.5);
            border: 3px solid var(--gold);
            display: flex;
            flex-direction: column-reverse; /* 아래서부터 쌓임 */
            align-items: center;
            padding: 10px;
            gap: 5px;
        }
        .altar-label {
            position: absolute;
            bottom: -30px;
            color: var(--gold);
            font-weight: bold;
        }

        /* 줌인 모달 */
        #zoom-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 컨트롤 및 상태 */
        #ui-panel {
            width: 800px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pop-btn {
            padding: 15px 30px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .pop-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>🏺 제단의 봉인을 푸십시오</h1>
    
    <div id="game-scene">
        <div id="mural" onclick="showZoom('낡은 벽화에 무지개빛 찬란한 순서가 기록되어 있습니다...')"></div>
        
        <div class="gem" style="background:red; top:300px; left:100px;" onclick="pushGem('Red')"></div>
        <div class="gem" style="background:blue; top:150px; left:600px;" onclick="pushGem('Blue')"></div>
        <div class="gem" style="background:yellow; top:350px; left:650px;" onclick="pushGem('Yellow')"></div>
        <div class="gem" style="background:green; top:100px; left:150px;" onclick="pushGem('Green')"></div>
        <div class="gem" style="background:orange; top:200px; left:50px;" onclick="pushGem('Orange')"></div>
        <div class="gem" style="background:indigo; top:320px; left:550px;" onclick="pushGem('Indigo')"></div>
        <div class="gem" style="background:violet; top:50px; left:680px;" onclick="pushGem('Violet')"></div>

        <div id="altar">
            <div class="altar-label">에너지 스택 (LIFO)</div>
        </div>

        <div id="zoom-overlay" onclick="this.style.display='none'">
            <div id="zoom-content">
                <h2 id="zoom-text"></h2>
                <p>(클릭하면 닫힙니다)</p>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div>
            <h3>현재 상태: <span id="status">보석을 순서대로 쌓으세요.</span></h3>
        </div>
        <button class="pop-btn" onclick="popGem()">잘못 넣음 (Pop Last)</button>
    </div>

    <script>
        const answer = ["Red", "Orange", "Yellow", "Green", "Blue", "Indigo", "Violet"];
        let stack = [];

        function pushGem(color) {
            if (stack.length >= 7) return;
            
            stack.push(color);
            renderStack();
            checkWin();
        }

        function popGem() {
            if (stack.length === 0) return;
            
            const popped = stack.pop();
            document.getElementById('status').innerText = `${popped} 보석을 제거했습니다.`;
            renderStack();
        }

        function renderStack() {
            const altar = document.getElementById('altar');
            // 라벨 제외하고 비우기
            const items = altar.querySelectorAll('.stack-gem');
            items.forEach(item => item.remove());

            stack.forEach(color => {
                const div = document.createElement('div');
                div.className = 'stack-gem';
                div.style.width = '80%';
                div.style.height = '25px';
                div.style.backgroundColor = color;
                div.style.border = '2px solid white';
                div.style.borderRadius = '5px';
                altar.appendChild(div);
            });
        }

        function checkWin() {
            if (stack.length === 7) {
                const isCorrect = stack.every((val, index) => val === answer[index]);
                if (isCorrect) {
                    document.getElementById('status').innerText = "🎉 봉인이 해제되었습니다! 보물방으로 이동합니다.";
                    setTimeout(() => alert("성공! 당신은 진정한 스택 마스터입니다."), 500);
                } else {
                    document.getElementById('status').innerText = "순서가 틀렸습니다. 위에서부터 다시 꺼내세요!";
                }
            }
        }

        function showZoom(text) {
            const overlay = document.getElementById('zoom-overlay');
            const zoomText = document.getElementById('zoom-text');
            zoomText.innerText = text;
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
